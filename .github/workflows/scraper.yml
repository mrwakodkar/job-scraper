name: Daily Job Scraper

# Trigger: Every day at 2 PM IST (8:30 AM UTC)
on:
  schedule:
    - cron: '30 8 * * *'  # 8:30 AM UTC = 2 PM IST

  # Also allow manual trigger
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Step 1: Checkout repository (v5 = Node.js 24)
      - name: Checkout code
        uses: actions/checkout@v5

      # Step 2: Setup Python (v5 = Node.js 24)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      # Step 5: Run scraper (with timeout)
      - name: Run job scraper
        run: python scraper_with_playwright.py
        timeout-minutes: 10

      # Step 6: Upload results as artifact
      - name: Upload results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: job-results-${{ github.run_number }}
          path: jobs_scraped_*.json
          retention-days: 30
          if-no-files-found: 'warn'
          overwrite: true

      # Step 7: Commit results back to repo (optional)
      - name: Commit and push results
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f jobs_scraped_*.json ]; then
            git add jobs_scraped_*.json
            git commit -m "Daily job scrape - $(date)" || true
            git push || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
